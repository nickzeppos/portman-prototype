# Publishes the static export to GitHub Pages on every push to `publish`.
# Workflow: cut a `publish` branch from `main` (or merge into it) when the
# main branch is in a publish-ready state. The push to `publish` is what
# triggers a deploy — `main` itself is never deployed automatically.
#
# One-time setup in the GitHub repo:
#   - Settings → Pages → Build and deployment → Source: "GitHub Actions"
#   - If deploying to `<user>.github.io/<repo>` (project page rather than a
#     custom domain), set the workflow env var NEXT_PUBLIC_BASE_PATH to
#     `/<repo>` so Next emits asset URLs under that subpath. Leave unset
#     for a custom domain or for `<user>.github.io` (root) deploys.

name: Publish to GitHub Pages

on:
  push:
    branches: [publish]
  workflow_dispatch: {}

# Pages deploys are mutually exclusive — cancel an in-flight run if a new
# push lands on `publish`.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

# Force any JS-based action to run under Node 24. Node 20 is being phased
# out of GitHub-hosted runners (removal Sept 2026); pinning here silences
# the deprecation warning regardless of which action major you land on.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      # Cache Next's incremental build output. Key composes lockfile +
      # source-file hashes so cache invalidates whenever deps or any TS/TSX
      # file changes; restore-keys let an older cache seed a partial reuse
      # if the exact key misses.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Build static export
        run: npm run build
        env:
          # Repo serves at nickzeppos.github.io/portman-prototype, so Next
          # needs to emit asset/route URLs under that subpath. Drop this
          # env var if/when the site moves to a custom domain or root.
          NEXT_PUBLIC_BASE_PATH: /portman-prototype

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
